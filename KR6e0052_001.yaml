body:
  text: 隋天竺三藏闍那崛多譯如是我聞一時婆伽婆遊摩伽陀國法阿蘭拏處菩提場上普光堂中大福聚集妙喜所生普無毀處功德無量蓮華藏師子座中坐平等證覺一善淨覺者二無有二行三遊佛所遊四得至諸佛平等五到無障處六不退轉法七無遮行處八不捨無邊諸佛所作九住不思處十向無相法十一三世平等所生十二其身遍諸世界十三諸法智中無有疑惑十四於諸所行具足覺慧十五諸法智中不為慮難十六無分別身十七受諸菩薩智十八得至無二佛行最勝彼岸十九盡到無差別如來解脫智二十順到無邊無中佛地平等二十一法界最極二十二虛空界究竟二十三無後際盡二十四於諸劫數常轉法輪身不休息二十五共六十二百千比丘彼謂奢利弗多囉隋云鸜鵒子舊名舍利弗者一摩訶毛伽利耶夜那舊名大目揵連者二摩訶迦葉簸三阿泥留馱四修浮帝隋云善實舊名須菩提者五迦底耶夜那舊名迦旃延者六摩訶劫譬那舊名劫賓那者七黎婆多八難陀九那提迦葉簸十伽耶迦葉簸十一富囉拏迷低黎夜尼弗多囉隋云滿慈子舊名富樓那者十二伽傍簸帝隋云牛主舊名憍梵波提者十三周稚般他迦隋云髻道舊名周利槃陀者十四達囉弊夜摩羅弗多囉隋云物力士子舊名沓婆摩羅子者十五佉馱囉婆那迦十六專陀十七摩訶俱絺羅十八囉侯羅十九阿難陀二十如是為首有六十二百千比丘皆遊一法等入境界皆入諸法自性行皆無所住虛空境界皆遊無所依處皆已離諸煩惱障蓋所起皆已入諸如來法界光明行皆平等入一法皆向普智皆於普智道無有休息皆說普智智無有退意皆已得至別智智觀最勝彼岸皆從方便境界行處所生復共六十百千比丘尼摩訶鉢囉闍簸帝比丘尼耶輸陀囉比丘尼為首皆善集白法皆近普智智皆入普智光明行皆於明法如是善通諸法無相如是下入諸法實際如是順到諸法不生不滅無有助對如是信解皆安住不思解脫三摩地皆隨化度衆生如無功用無分別色身形類威儀示現復與大菩薩衆有十佛土不可說俱致那由多百千微塵等菩薩摩訶薩彼謂普賢菩薩摩訶薩普日菩薩普化菩薩普智菩薩普眼菩薩普光菩薩普明菩薩普照菩薩普幢菩薩普意菩薩摩訶薩大速行菩薩大速持菩薩大遊戲菩薩大遊戲王菩薩大精進勇步菩薩大勇步健菩薩大頻申菩薩大頻申力菩薩大衆主菩薩平等光明月菩薩法無垢月菩薩顯赫月菩薩震聲月菩薩放光月菩薩摩訶薩梵音菩薩梵主雷音菩薩地鳴音菩薩諸音分勝音菩薩摩訶薩普孕菩薩普無垢孕菩薩功德孕菩薩顯赫孕菩薩寶孕菩薩月孕菩薩日孕菩薩熾然孕菩薩蓮華孕菩薩摩訶薩意菩薩大意菩薩勝意菩薩震聲意菩薩上意菩薩妙意菩薩增長意菩薩無邊意菩薩廣意菩薩覺意菩薩無盡意菩薩海意菩薩摩訶薩迷留燈菩薩法炬燈菩薩諸方遍燈菩薩普燈菩薩滅諸暗燈菩薩諸趣明燈菩薩一向照燈菩薩月燈菩薩日燈菩薩摩訶薩曼殊尸利童子菩薩觀世音菩薩大勢至菩薩金剛孕菩薩功德孕菩薩捨惡道菩薩藥王菩薩藥上菩薩支帝神廟雷音菩薩蓮華手菩薩日光菩薩離塵勇步菩薩金剛意菩薩閉塞諸蓋菩薩降伏摩囉菩薩寶髻菩薩十百光明火熾然菩薩大降伏摩囉菩薩難出現菩薩難降伏菩薩入度菩薩難稱事意菩薩乾竭惡趣菩薩慈者菩薩摩訶薩如是為首十佛土不可說俱致那由多百千微塵等菩薩摩訶薩皆是一生補處各異世界來集善安立菩薩欲令成熟思惟方便行化度諸衆生界欲令成熟一皆遍諸世界思惟行智遍入二皆思惟善觀察涅槃地境界智三善攝衆生界斷諸戲論及斷行取四皆善住入無邊中法行五皆思惟善觀察衆生業報不失不得六皆思惟善觀察衆生界信根發起方便最勝七皆善平等持過去未來現在諸如來所說義句味受持智八皆善住入世間出世間無邊中法行九皆善觀察有為無為三世過量法行十皆次第無間得遊過去未來現在諸如來智場相十一皆於心剎那心剎那間善示現墮沒出生出家苦行方便詣菩提場降伏摩囉證覺菩提轉法輪大涅槃十二皆不離諸衆生令其發心證覺菩提十三皆入一衆生心攀緣善順到無餘諸衆生心攀緣十四皆於自然地不動菩薩身十五皆得普智地不退轉行十六皆入菩薩所作力不休息無作智行十七皆善住持一衆生所作無邊劫行十八皆善入不錯謬轉法輪安住諸世間化度界十九皆具足過去未來現在諸如來淨處受行力勝願二十皆具足普賢行願殊勝淨信二十一皆詣諸佛出處善能勸請二十二皆善持諸如來法教二十三皆作不斷諸佛種姓二十四皆於無佛世界示現佛出二十五皆能清淨濁染世界二十六皆滅諸菩薩業障二十七皆已入無礙法界二十八皆具足虛空界量法二十九皆具足法界無礙平等三十皆具足實際法界平等三十一皆信解威儀業所起報三十二皆信解如因所起果三十三皆具足印別印起諸法平等智三十四皆具足影像水月法平等三十五皆具足覺諸法響等音鳴三十六皆安住不思解脫三摩地三十七遊戲首楞伽摩三摩地三十八皆安住無邊佛身色成就出生陀羅尼三十九皆善於一毛道現諸世界四十依梵本此間有三句與前二十二十一二十二等三句次第相似故不重出皆於一毛道中十方善能示現墮沒出生出家苦行方便詣菩提場示現降伏摩囉證覺菩提轉法輪大涅槃四十一皆具足以一加趺十方諸世界遍滿智四十二皆善示現諸土瓔珞具於一土中四十三皆善示現一土瓔珞具於諸土中四十四皆善示現滿十方世界諸如來衆於一如來衆中四十五善示現一如來衆於十方諸世界諸如來衆中四十六善示現諸衆生身四十七善示現諸佛身入一佛身四十八善示現一佛身入諸佛身四十九善示現諸方諸世界入自身中五十善示現諸三世衆生身於一衆生五十一皆善示現過去世入未來世未來世入過去世過去世入現在世現在世入過去世過去世入未來世五十二皆善以一身入三摩地於無量無數身起五十三善以無量無數身入三摩地於一身起五十四皆善示現諸身譬喻證覺菩提五十五皆善示現諸衆生身於一衆生身中五十六善示現一衆生身於諸衆生身中五十七善示現諸佛身於一佛身中五十八善示現一佛身於諸佛身中五十九善示現諸衆生身即是法身六十皆善示現諸土莊嚴具於一土中六十一善示現一土莊嚴具於諸土中六十二善納十方諸世界於一毛孔中六十三皆善示現諸佛證覺菩提願力智令諸衆生證覺六十四皆遍十方世界隨所成就衆生隨所化度如無上正覺善能示現六十五皆善示現於諸劫數一一世界中菩薩行行身不休息六十六皆於一心生時遍十方諸世界一一世界中諸衆生若卵生若胎生若濕生若化生若有色若無色若有想若無想若二足若四足若多足若天龍夜叉揵闥婆阿修囉伽留荼緊那囉摩睺囉伽舍迦囉婆囉訶摩盧迦波羅人非人等隨所成熟化度如是無功用無分別作威儀行入其住處善能示現六十七皆於一微塵中善納無量無數不可稱不可量不可說世界而心不逼惱六十八皆善以無量無數不可思不可稱不可量不可說不可說劫於一牟侯利位時住持六十九善以一牟侯利位時於無量無數不可思不可稱不可量不可說不可說劫住持七十皆隨衆生所成熟行如是無功用無分別色身形類威儀善能示現如是及餘無量無數俱致那由多百千功德具足菩薩摩訶薩復有無量無數不可思不可稱不可量不可說天龍夜叉揵闥婆阿修囉伽留荼緊那囉摩睺囉伽舍迦囉婆囉訶摩護世等各從種種佛土來集此世界中百俱致四大王身天一一大多眷屬圍繞詣向佛所為欲禮覲供養親事聽法復有百俱致舍迦囉百俱致修夜摩天王百俱致兜率多天王百俱致善化天王百俱致他化自在天王一一天王大多眷屬圍繞詣向佛所為欲禮覲供養親事聽法復有俱致摩囉身天商主前行詣向佛所為欲禮覲供養親事聽法復有百俱致婆囉訶摩百俱致大婆囉訶摩百俱致少光百俱致無量光百俱致光音百俱致少淨百俱致無量淨百俱致遍淨百俱致廣果百俱致善現百俱致大廣百俱致大熾百俱致究竟諸天一一婆囉訶摩大多眷屬圍繞詣向佛所為欲禮覲供養親事聽法百俱致淨居身天大自在天子前行詣向佛所為欲禮覲供養親事聽法百俱致龍主百俱致夜叉主百俱致揵闥婆主百俱致阿修囉主百俱致伽留荼主百俱致緊那囉主百俱致摩睺囉伽主一一大多眷屬圍繞詣向佛所為欲禮覲供養親事聽法復有無量無數人非人等詣向佛所為欲禮覲供養親事聽法復有多俱致那由多百千優波娑迦優波斯迦詣向佛所為欲禮覲供養親事聽法復有諸藥草樹林天等迷留大迷留目真鄰陀大目真鄰陀雪山輪山等諸山天詣向佛所為欲禮覲供養親事聽法復有海大海河池陂天等詣向佛所為欲禮覲供養親事聽法復有村城國王所治處天等詣向佛所為欲禮覲供養親事聽法復有龍夜叉揵闥婆阿修囉伽留荼緊那囉摩睺囉伽宮中所有天等詣向佛所為欲禮覲供養親事聽法以佛神力故衆生無有逼惱復有百俱致月百俱致日百俱致海一一大多眷屬圍繞詣向佛所為欲禮覲供養親事聽法復有龍王名阿那婆怛簸多大眷屬圍繞詣向佛所為欲禮覲供養親事聽法爾時世尊光明顯熾映蔽諸衆如彼白助月輪於十五日雲網放脫光明顯熾映蔽諸星宿輪如是如是世尊亦然映蔽諸舍迦囉婆囉訶摩護世等光明顯熾如修迷留山王光明顯熾功德顯熾住不動身不戰不喘爾時曼殊尸利童真告遮塞諸蓋菩薩言佛子此如來住不動身不戰不喘如是語已遮塞諸蓋菩薩摩訶薩告曼殊尸利童真言曼殊尸利此如來於此衆中或有天人知其從家而出欲向出家或有知其住苦行處於此衆中或有知其詣菩提場或有坐菩提場於此衆中或有無量無數摩囉衆圍繞或有知其破壞摩囉無量無數天龍夜叉揵闥婆阿修囉伽留荼緊那囉摩睺囉伽舍迦囉婆囉訶摩盧迦波羅等欲助與力勝勝大商主或有知其證覺已舍迦囉勸請或有婆囉訶摩或有知此衆中盧迦波羅勸請世尊或有知世尊為我等說陀那此衆中或有知世尊為我等說尸羅或有說忍或有說精進或有說思惟定或有知世尊為我等說鉢囉闍若波囉蜜或有說方便或有知世尊為我等說願或有說力或有說闍若那或有知世尊為我等說聲聞乘或有說獨覺乘或有說大乘或有知世尊為我等說生畜生法或有生餓鬼或有知世尊為我等說生閻摩世法或有知世尊為我等說生四大王天宮法或有生三十三天或有知世尊為我等說生夜摩天宮法或有知世尊為我等說生兜率天宮法或有生化天宮或有生他化自在天宮或有生摩囉天宮或有知世尊為我等說生婆囉訶摩天宮法或有生人或有此衆中知世尊為我等說當得轉輪王曼殊尸利或有此衆中知如來高二尋或有高一俱嚧舍或有高二俱嚧舍或有高半踰闍那或有知如來身高二踰闍那或有知如來身十踰闍那或有此衆中知如來身千踰闍那或有知如來身十二十三十四十五十百千踰闍那或有知如來身八十四百千踰闍那或有此衆中知如來身過百千數踰闍那或有見金色或有鞞琉璃夜摩尼寶色或有因陀囉青摩尼寶色或有大青摩尼寶色或有火光摩尼寶色或有波頭摩染摩尼寶色或有知如來身舍迦囉毗楞伽那摩尼寶色或有金剛光摩尼寶色或有諸天光摩尼寶色或有日月光摩尼寶色或有水光摩尼寶色或有知如來頗致迦摩尼寶色或有自在王摩尼寶色或有諸光最上摩尼寶色或有師子鬚摩尼寶色或有師子幢上摩尼寶色或有海住持淨莊嚴普炎光摩尼寶色曼殊尸利或有此衆中知如來如意摩尼寶色曼殊尸利所有如是色威儀住得化度衆生曼殊尸利彼衆生見如來彼彼如是色威儀住曼殊尸利所有說法得成熟衆生彼等衆生知如來如是說法曼殊尸利所有修行令諸衆生入如來教得受化度彼衆生知如來住彼彼行曼殊尸利若於東方無量無數不可思不可稱不可量不可說諸世界悉滿天龍夜叉揵闥婆阿修囉伽留荼緊那囉摩睺囉伽舍迦囉婆囉訶摩護世人非人等如東方如是南方西方北方東南方西南方西北方如是東北方上方下方無量無數不可思不可稱不可量不可說諸世界悉滿天龍夜叉揵闥婆阿修囉伽留荼緊那囉摩睺囉伽舍迦囉婆囉訶摩護世人非人等譬如竹林甘蔗林胡麻林曼殊尸利若諸衆生見如來已得化度者彼諸衆生在如來前一尋量住而見如來所有所有色威儀住彼等衆生得化度者衆生見如來在前彼彼色威儀住曼殊尸利所有說法已令彼衆生當得成熟彼彼當聞如是說法曼殊尸利所有修行令彼衆生入如來教當得成熟彼彼修行如來當住如來諸所作事無功用無分別而自回轉曼殊尸利譬如白助月輪於半夜時閻浮地鞞波諸衆生各各知月輪在前而月輪亦無分別無異分別如是我於衆生前住欲令衆生知我月輪曼殊尸利然月輪無功用無分別故此如是色事轉以不共法故如是如是
